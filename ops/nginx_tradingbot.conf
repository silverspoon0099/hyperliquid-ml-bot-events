# Combined nginx config: scalping bot (existing) + ml-bot-events dashboard (new).
#
# Routes:
#   http://173.208.208.155/             → existing Node scalping bot on :3000
#   http://173.208.208.155/dashboard/   → ml-bot-events Streamlit dashboard on :8501
#
# To install:
#   sudo cp ops/nginx_tradingbot.conf /etc/nginx/sites-available/tradingbot
#   sudo nginx -t                    # validate config syntax
#   sudo systemctl reload nginx      # apply without dropping connections
#
# To rollback:
#   git checkout HEAD~1 -- ops/nginx_tradingbot.conf
#   sudo cp ops/nginx_tradingbot.conf /etc/nginx/sites-available/tradingbot
#   sudo systemctl reload nginx
#
# The /etc/nginx/sites-enabled/tradingbot symlink points at sites-available,
# so this single file is the source of truth.

server {
    listen 80;
    server_name 173.208.208.155;

    # ────────────────────────────────────────────────────────────
    # DR v3.0.26 — ml-bot-events Streamlit dashboard
    # ────────────────────────────────────────────────────────────
    # Streamlit needs WebSocket upgrade for live UI updates.
    # baseUrlPath=dashboard is configured in ecosystem.config.js so
    # Streamlit emits asset URLs under /dashboard/static/... etc.

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8501/dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;            # long for WS connections
        proxy_buffering off;                 # Streamlit streams
    }
    # Redirect /dashboard (no trailing slash) → /dashboard/
    location = /dashboard {
        return 301 /dashboard/;
    }

    # ────────────────────────────────────────────────────────────
    # Existing scalping bot (Node on :3000)
    # ────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
